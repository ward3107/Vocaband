# fly.toml app configuration file generated for vocaband on 2026-04-25T17:59:35Z
#
# What runs here:
#   * Express on /api/*   (translate, OCR, AI sentences, health)
#   * socket.io on /socket.io/  (Live Challenge + Quick Play)
#
# What does NOT run here:
#   * The SPA (built by Cloudflare Pages → vocaband.com)
#   * The Worker proxy (Cloudflare Worker → routes /api/* +
#     /socket.io/* to this Fly service via API_BACKEND constant in
#     worker/index.ts)
#
# Why Fly: auto-stop kicks in after the school day, idle nights /
# weekends / holidays cost ~$0.  Same socket.io code runs unchanged.
#
# Deploy: `fly deploy` (uses Dockerfile + fly.toml in this dir).
# Logs:   `fly logs`
# SSH:    `fly ssh console`

app = 'vocaband'
primary_region = 'fra'

# ─── Required secrets (set with `fly secrets set NAME=value`) ────
#   SUPABASE_URL                 — Supabase project URL.  Also used to fetch
#                                  the JWKS at /auth/v1/.well-known/jwks.json
#                                  for local JWT signature verification.
#   SUPABASE_SERVICE_ROLE_KEY    — admin key for SECURITY DEFINER paths
#   GOOGLE_AI_API_KEY            — Gemini OCR + sentence generation
#   ANTHROPIC_API_KEY            — Bagrut test generation
#   ALLOWED_ORIGIN               — comma-separated CORS origins (prod)
#
# Local JWT verification activates automatically once SUPABASE_URL is set —
# no additional secret is required.  See docs/load-test-report-2026-05-21.md
# for the bottleneck this avoids; verifyToken in server.ts does the JWKS
# fetch + cache + verify via the `jose` library.
#
# ─── Optional: REDIS_URL (multi-VM scaling) ───────────────────────
# When set, server.ts attaches @socket.io/redis-adapter so socket.io
# broadcasts (Live Challenge + Quick Play leaderboards) propagate
# across every Fly VM. Without it, scaling beyond 1 VM silently
# breaks live sessions (students on VM-A can't see scores from
# students on VM-B).
#
# Provision an Upstash Redis instance in eu-central-1 (same region
# as `fra` here for <5ms latency), copy the rediss:// URL, then:
#   fly secrets set REDIS_URL=rediss://default:<password>@<host>:6380
# Free tier (10k commands/day) is enough for ~5 simultaneous full
# classrooms; bump to paid (~$10/mo) for 1000+ concurrent QP players.

[build]

# ─── HTTP service ─────────────────────────────────────────────────
# Fly's `http_service` handles HTTPS termination, HTTP/2, and
# WebSocket upgrades transparently.  socket.io connections survive
# unchanged through Fly's edge proxy.
[http_service]
  internal_port = 3002
  force_https = true
  # Auto-suspend when nobody's connected.  Wakes in <1 s on the next
  # request.  This is the entire reason for picking Fly over Render
  # for a school-hours app.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one VM hot at all times — first request after idle skips
  # the ~1 s cold-start wake-up. The other provisioned VMs auto-stop
  # when traffic is low and auto-start when concurrency triggers it.
  min_machines_running = 1
  processes = ['app']

  # Per-VM concurrency, sized for ~10,000 concurrent students after the
  # JWKS-based local JWT verification landed (#866 / #877).  Before
  # JWKS, every socket cost a ~300 ms Supabase auth.getUser() round-
  # trip, so the auth pipeline saturated at ~1500 sockets/VM and the
  # safe hard_limit was 2000.  With local JWKS verification, per-
  # connection auth is <5 ms and the per-VM ceiling is bounded by
  # memory (~30 KB/socket × 5000 = 150 MB, fits in 512 MB) and Node's
  # event loop (~5000 sockets is well under saturation on shared-cpu-1x).
  #
  # 3500 soft / 5000 hard per shared-cpu-1x w/ 512 MB:
  #   ~30 KB/socket × 5000 = 150 MB socket buffer (~30% of 512 MB)
  #   Fly wakes the next VM once a machine crosses soft_limit (3500).
  # With 2 VMs warm + auto-scale this comfortably absorbs the 10k
  # concurrent students target documented in
  # docs/load-test-report-2026-05-21.md.  Validated in staging
  # (vocaband-staging-honeyed-brook-4330) at 10k connections.
  [http_service.concurrency]
    type = 'connections'
    hard_limit = 5000
    soft_limit = 3500

  # Health check.  server.ts already exposes /api/health.  `grace_period`
  # gives the Node process time to JIT-compile + open the DB pool on
  # cold boot before the first probe fires.
  [[http_service.checks]]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/api/health'

# ─── VM size ──────────────────────────────────────────────────────
# 512 MB is the sweet spot.  256 MB OOM-killed Node within seconds of
# boot (tsx JIT + supabase-js + sharp pushes RSS past 256 MB before the
# server even finishes starting).  512 MB is still cheap on the Hobby
# plan (~$3/mo if always-on; auto-stop drops it close to $0).
[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
