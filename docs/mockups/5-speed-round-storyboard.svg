<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#d946ef"/></linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#fbbf24"/></marker>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1280" height="820" fill="url(#bg)"/>

  <text x="640" y="52" fill="#fff" font-size="30" font-weight="800" text-anchor="middle">One Speed Round session, round by round</text>
  <text x="640" y="82" fill="#94a3b8" font-size="16" text-anchor="middle">Same word set · different fast mode each round · the leaderboard carries over the whole time</text>

  <!-- ROUND 1 -->
  <g filter="url(#sh)"><rect x="40" y="110" width="380" height="380" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#f97316" stroke-opacity="0.5" stroke-width="2"/></g>
  <g filter="url(#sh)"><rect x="64" y="132" width="332" height="50" rx="14" fill="url(#amber)"/></g>
  <text x="230" y="165" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">ROUND 1 · mode: true-false</text>

  <g filter="url(#sh)"><rect x="80" y="206" width="300" height="120" rx="16" fill="url(#violet)"/></g>
  <text x="230" y="238" fill="#ede9fe" font-size="13" text-anchor="middle">TRUE or FALSE? ⏱ 5s</text>
  <text x="230" y="280" fill="#fff" font-size="26" font-weight="800" text-anchor="middle">"abundant" =</text>
  <text x="230" y="308" fill="#fff" font-size="18" text-anchor="middle">"very rare"</text>
  <g transform="translate(80,340)"><rect width="142" height="46" rx="14" fill="#10b981"/><text x="71" y="30" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">TRUE</text></g>
  <g transform="translate(238,340)"><rect width="142" height="46" rx="14" fill="#ef4444"/><text x="71" y="30" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">FALSE ✓</text></g>
  <text x="230" y="430" fill="#fde047" font-size="15" font-weight="700" text-anchor="middle">⚡ Daniel answered first (+50)</text>
  <text x="230" y="458" fill="#c4b5fd" font-size="14" text-anchor="middle">everyone raced the same card at once</text>

  <!-- arrow 1->2 -->
  <line x1="424" y1="300" x2="476" y2="300" stroke="#fbbf24" stroke-width="4" marker-end="url(#arr)"/>

  <!-- ROUND 2 -->
  <g filter="url(#sh)"><rect x="450" y="110" width="380" height="380" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#f97316" stroke-opacity="0.5" stroke-width="2"/></g>
  <g filter="url(#sh)"><rect x="474" y="132" width="332" height="50" rx="14" fill="url(#amber)"/></g>
  <text x="640" y="165" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">ROUND 2 · mode: classic</text>

  <g filter="url(#sh)"><rect x="490" y="206" width="300" height="120" rx="16" fill="url(#violet)"/></g>
  <text x="640" y="238" fill="#ede9fe" font-size="13" text-anchor="middle">PICK THE MEANING ⏱ 5s</text>
  <text x="640" y="278" fill="#fff" font-size="28" font-weight="800" text-anchor="middle">"abundant"</text>
  <g transform="translate(490,340)"><rect width="142" height="46" rx="14" fill="#10b981"/><text x="71" y="29" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">plentiful ✓</text></g>
  <g transform="translate(648,340)"><rect width="142" height="46" rx="14" fill="#ffffff" fill-opacity="0.14"/><text x="71" y="29" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">tired</text></g>
  <text x="640" y="430" fill="#fde047" font-size="15" font-weight="700" text-anchor="middle">⚡ Maya answered first (+50)</text>
  <text x="640" y="458" fill="#c4b5fd" font-size="14" text-anchor="middle">same words, new question format</text>

  <!-- arrow 2->3 -->
  <line x1="834" y1="300" x2="886" y2="300" stroke="#fbbf24" stroke-width="4" marker-end="url(#arr)"/>

  <!-- ROUND 3 -->
  <g filter="url(#sh)"><rect x="860" y="110" width="380" height="380" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#f97316" stroke-opacity="0.5" stroke-width="2"/></g>
  <g filter="url(#sh)"><rect x="884" y="132" width="332" height="50" rx="14" fill="url(#amber)"/></g>
  <text x="1050" y="165" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">ROUND 3 · mode: listening</text>

  <g filter="url(#sh)"><rect x="900" y="206" width="300" height="120" rx="16" fill="url(#violet)"/></g>
  <text x="1050" y="238" fill="#ede9fe" font-size="13" text-anchor="middle">HEAR IT · PICK IT ⏱ 5s</text>
  <text x="1050" y="284" font-size="44" text-anchor="middle">🔊</text>
  <g transform="translate(900,340)"><rect width="142" height="46" rx="14" fill="#10b981"/><text x="71" y="29" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">abundant ✓</text></g>
  <g transform="translate(1058,340)"><rect width="142" height="46" rx="14" fill="#ffffff" fill-opacity="0.14"/><text x="71" y="29" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">absent</text></g>
  <text x="1050" y="430" fill="#fde047" font-size="15" font-weight="700" text-anchor="middle">⚡ Daniel answered first (+50)</text>
  <text x="1050" y="458" fill="#c4b5fd" font-size="14" text-anchor="middle">teacher just taps "next round"</text>

  <!-- carry-over leaderboard bar -->
  <g filter="url(#sh)"><rect x="40" y="540" width="1200" height="220" rx="24" fill="url(#teal)" fill-opacity="0.14" stroke="#14b8a6" stroke-opacity="0.5" stroke-width="2"/></g>
  <text x="64" y="582" fill="#5eead4" font-size="20" font-weight="800">🏆 ONE leaderboard runs across ALL rounds (the scores stack)</text>

  <g transform="translate(64,604)" font-size="17">
    <g><rect width="1152" height="42" rx="12" fill="#fbbf24" fill-opacity="0.25"/><text x="20" y="28" fill="#fde047" font-weight="800">🥇 1  🐯 Daniel</text><text x="1132" y="28" fill="#fff" text-anchor="end" font-weight="700">150 pts (won R1 + R3)</text></g>
  </g>
  <g transform="translate(64,652)" font-size="17">
    <g><rect width="1152" height="42" rx="12" fill="#ffffff" fill-opacity="0.10"/><text x="20" y="28" fill="#fff" font-weight="700">🥈 2  🦊 Maya</text><text x="1132" y="28" fill="#a7f3d0" text-anchor="end" font-weight="700">120 pts (won R2)</text></g>
  </g>
  <g transform="translate(64,700)" font-size="17">
    <g><rect width="1152" height="42" rx="12" fill="#ffffff" fill-opacity="0.10"/><text x="20" y="28" fill="#fff" font-weight="700">🥉 3  🐼 Noa</text><text x="1132" y="28" fill="#a7f3d0" text-anchor="end" font-weight="700">95 pts</text></g>
  </g>

  <text x="640" y="800" fill="#94a3b8" font-size="15" text-anchor="middle">Kids get mode VARIETY across the session, but every single round is one clean, raceable format.</text>
</svg>
