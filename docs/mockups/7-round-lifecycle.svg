<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#5eead4"/></marker>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <text x="640" y="50" fill="#fff" font-size="28" font-weight="800" text-anchor="middle">What happens inside ONE word (the round lifecycle)</text>
  <text x="640" y="80" fill="#94a3b8" font-size="15" text-anchor="middle">The server is the referee · each box is a state the whole room moves through together</text>

  <!-- states -->
  <g font-size="15">
    <!-- LOBBY -->
    <g transform="translate(40,150)" filter="url(#sh)"><rect width="180" height="110" rx="16" fill="#ffffff" fill-opacity="0.08"/></g>
    <text x="130" y="190" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">LOBBY</text>
    <text x="130" y="216" fill="#c4b5fd" text-anchor="middle">waiting to start</text>
    <text x="130" y="238" fill="#94a3b8" font-size="13" text-anchor="middle">kids join</text>

    <!-- REVEAL -->
    <g transform="translate(270,150)" filter="url(#sh)"><rect width="180" height="110" rx="16" fill="url(#violet)"/></g>
    <text x="360" y="190" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">REVEAL</text>
    <text x="360" y="216" fill="#ede9fe" text-anchor="middle">word + timer</text>
    <text x="360" y="238" fill="#ede9fe" font-size="13" text-anchor="middle">sent to everyone</text>

    <!-- RACING -->
    <g transform="translate(500,150)" filter="url(#sh)"><rect width="180" height="110" rx="16" fill="url(#amber)"/></g>
    <text x="590" y="186" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">RACING ⚡</text>
    <text x="590" y="212" fill="#fff7ed" text-anchor="middle">kids tap answers</text>
    <text x="590" y="234" fill="#fff7ed" font-size="13" text-anchor="middle">server times each</text>

    <!-- SCORING -->
    <g transform="translate(730,150)" filter="url(#sh)"><rect width="180" height="110" rx="16" fill="#ffffff" fill-opacity="0.08"/></g>
    <text x="820" y="186" fill="#fff" font-size="17" font-weight="800" text-anchor="middle">SCORE</text>
    <text x="820" y="210" fill="#c4b5fd" text-anchor="middle">correct? + speed</text>
    <text x="820" y="232" fill="#c4b5fd" font-size="13" text-anchor="middle">mark fastest ⚡</text>

    <!-- RESULT -->
    <g transform="translate(960,150)" filter="url(#sh)"><rect width="180" height="110" rx="16" fill="url(#teal)"/></g>
    <text x="1050" y="186" fill="#fff" font-size="17" font-weight="800" text-anchor="middle">RESULT</text>
    <text x="1050" y="210" fill="#ecfdf5" text-anchor="middle">podium updates</text>
    <text x="1050" y="232" fill="#ecfdf5" font-size="13" text-anchor="middle">show right answer</text>
  </g>

  <!-- arrows between -->
  <line x1="220" y1="205" x2="266" y2="205" stroke="#5eead4" stroke-width="3" marker-end="url(#arr)"/>
  <text x="243" y="195" fill="#5eead4" font-size="12" text-anchor="middle">START</text>
  <line x1="450" y1="205" x2="496" y2="205" stroke="#5eead4" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="680" y1="205" x2="726" y2="205" stroke="#5eead4" stroke-width="3" marker-end="url(#arr)"/>
  <text x="703" y="195" fill="#5eead4" font-size="11" text-anchor="middle">all in OR</text>
  <text x="703" y="288" fill="#5eead4" font-size="11" text-anchor="middle">timer ends</text>
  <line x1="910" y1="205" x2="956" y2="205" stroke="#5eead4" stroke-width="3" marker-end="url(#arr)"/>

  <!-- loop back to reveal (next word) -->
  <path d="M1050 260 L1050 360 L360 360 L360 264" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="6 6" marker-end="url(#arr)"/>
  <text x="700" y="385" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">▶ NEXT WORD (auto after a few seconds, or teacher taps) — loops until the word set is done</text>

  <!-- final -->
  <g transform="translate(500,440)" filter="url(#sh)"><rect width="280" height="100" rx="18" fill="#fde047"/></g>
  <text x="640" y="478" fill="#451a03" font-size="20" font-weight="800" text-anchor="middle">🏆 FINAL RESULTS</text>
  <text x="640" y="506" fill="#78350f" font-size="14" text-anchor="middle">winner + full ranking</text>
  <text x="640" y="526" fill="#78350f" font-size="13" text-anchor="middle">scores saved to Supabase</text>
  <path d="M1050 360 L1050 490 L784 490" fill="none" stroke="#fde047" stroke-width="3" marker-end="url(#arr)"/>
  <text x="1000" y="430" fill="#fde047" font-size="13" text-anchor="middle">last word done</text>

  <text x="640" y="600" fill="#5eead4" font-size="14" text-anchor="middle" font-weight="700">This exact lifecycle already exists for Category Race — Speed Round reuses it with a single-word buzzer question.</text>
</svg>
