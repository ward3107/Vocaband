<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdba74"/><stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Header -->
  <text x="48" y="62" fill="#fff" font-size="34" font-weight="700">⚡ Speed Round — Live</text>
  <text x="48" y="96" fill="#c4b5fd" font-size="20">Class 7B · 24 players connected</text>

  <!-- Word + countdown card (the synchronized buzzer) -->
  <g filter="url(#sh)">
    <rect x="48" y="128" width="560" height="180" rx="28" fill="url(#hero)"/>
  </g>
  <text x="80" y="172" fill="#ede9fe" font-size="18" font-weight="600">NOW RACING · Word 4 / 12</text>
  <text x="80" y="240" fill="#fff" font-size="58" font-weight="800">abundant</text>
  <text x="80" y="284" fill="#f5d0fe" font-size="20">Tap the correct meaning fastest ⚡</text>

  <!-- countdown ring -->
  <g transform="translate(520,218)">
    <circle r="62" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="12"/>
    <circle r="62" fill="none" stroke="#fde047" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="389.5" stroke-dashoffset="140" transform="rotate(-90)"/>
    <text x="0" y="6" fill="#fff" font-size="34" font-weight="800" text-anchor="middle">3.2s</text>
    <text x="0" y="34" fill="#fde047" font-size="14" font-weight="600" text-anchor="middle">left</text>
  </g>

  <!-- Podium -->
  <text x="700" y="160" fill="#fff" font-size="24" font-weight="700">🏆 Podium</text>

  <!-- 2nd -->
  <g transform="translate(700,300)">
    <circle cx="60" cy="-30" r="38" fill="url(#silver)"/>
    <text x="60" y="-18" font-size="38" text-anchor="middle">🦊</text>
    <rect x="10" y="20" width="100" height="150" rx="14" fill="url(#silver)" filter="url(#sh)"/>
    <text x="60" y="70" font-size="40" font-weight="800" text-anchor="middle" fill="#334155">2</text>
    <text x="60" y="105" font-size="16" font-weight="700" text-anchor="middle" fill="#1e293b">Maya</text>
    <text x="60" y="132" font-size="15" text-anchor="middle" fill="#475569">418 pts</text>
  </g>

  <!-- 1st -->
  <g transform="translate(820,270)">
    <circle cx="60" cy="-40" r="44" fill="url(#gold)"/>
    <text x="60" y="-26" font-size="44" text-anchor="middle">🐯</text>
    <rect x="6" y="20" width="108" height="200" rx="14" fill="url(#gold)" filter="url(#sh)"/>
    <text x="60" y="80" font-size="48" font-weight="800" text-anchor="middle" fill="#78350f">1</text>
    <text x="60" y="118" font-size="17" font-weight="700" text-anchor="middle" fill="#451a03">Daniel</text>
    <text x="60" y="146" font-size="15" text-anchor="middle" fill="#78350f">503 pts</text>
    <rect x="14" y="160" width="92" height="30" rx="15" fill="#dc2626"/>
    <text x="60" y="181" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">⚡ FASTEST</text>
  </g>

  <!-- 3rd -->
  <g transform="translate(940,320)">
    <circle cx="60" cy="-26" r="34" fill="url(#bronze)"/>
    <text x="60" y="-14" font-size="34" text-anchor="middle">🐼</text>
    <rect x="14" y="20" width="92" height="130" rx="14" fill="url(#bronze)" filter="url(#sh)"/>
    <text x="60" y="66" font-size="36" font-weight="800" text-anchor="middle" fill="#7c2d12">3</text>
    <text x="60" y="100" font-size="16" font-weight="700" text-anchor="middle" fill="#431407">Noa</text>
    <text x="60" y="126" font-size="14" text-anchor="middle" fill="#7c2d12">390 pts</text>
  </g>

  <!-- Live leaderboard list -->
  <g transform="translate(48,360)">
    <text x="0" y="0" fill="#fff" font-size="22" font-weight="700">Live leaderboard</text>
    <g font-size="18">
      <!-- rows -->
      <g transform="translate(0,24)">
        <rect width="560" height="56" rx="14" fill="#ffffff" fill-opacity="0.08"/>
        <text x="22" y="35" fill="#fbbf24" font-weight="700">4</text>
        <text x="56" y="35" font-size="26">🐸</text><text x="96" y="35" fill="#fff">Yossi</text>
        <text x="540" y="35" fill="#a7f3d0" text-anchor="end" font-weight="700">355 ⚡+8</text>
      </g>
      <g transform="translate(0,88)">
        <rect width="560" height="56" rx="14" fill="#ffffff" fill-opacity="0.08"/>
        <text x="22" y="35" fill="#fbbf24" font-weight="700">5</text>
        <text x="56" y="35" font-size="26">🐧</text><text x="96" y="35" fill="#fff">Lara</text>
        <text x="540" y="35" fill="#a7f3d0" text-anchor="end" font-weight="700">312 ⚡+5</text>
      </g>
      <g transform="translate(0,152)">
        <rect width="560" height="56" rx="14" fill="#ffffff" fill-opacity="0.08"/>
        <text x="22" y="35" fill="#fbbf24" font-weight="700">6</text>
        <text x="56" y="35" font-size="26">🦉</text><text x="96" y="35" fill="#fff">Omar</text>
        <text x="540" y="35" fill="#a7f3d0" text-anchor="end" font-weight="700">298</text>
      </g>
    </g>
  </g>

  <!-- Teacher controls -->
  <g transform="translate(700,560)">
    <rect width="532" height="180" rx="24" fill="#ffffff" fill-opacity="0.08"/>
    <text x="28" y="44" fill="#fff" font-size="20" font-weight="700">Teacher controls</text>
    <rect x="28" y="64" width="220" height="48" rx="24" fill="url(#amber)"/>
    <text x="138" y="94" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">▶ Next word</text>
    <rect x="264" y="64" width="240" height="48" rx="24" fill="#ffffff" fill-opacity="0.16"/>
    <text x="384" y="94" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">⏱ Auto-run: ON</text>
    <text x="28" y="146" fill="#c4b5fd" font-size="15">Scoring is server-authoritative · speed bonus by arrival time</text>
  </g>

  <text x="640" y="784" fill="#a78bfa" font-size="15" text-anchor="middle" opacity="0.8">Vocaband · Speed Round mockup — reuses LiveChallengeView podium + Category Race timing</text>
</svg>
