<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" font-family="'Plus Jakarta Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="qp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6366F1"/><stop offset=".5" stop-color="#8B5CF6"/><stop offset="1" stop-color="#D946EF"/></linearGradient>
    <linearGradient id="race" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#D946EF"/><stop offset=".5" stop-color="#EC4899"/><stop offset="1" stop-color="#FB7185"/></linearGradient>
    <linearGradient id="speed" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F59E0B"/><stop offset=".5" stop-color="#F97316"/><stop offset="1" stop-color="#EF4444"/></linearGradient>
    <linearGradient id="arena" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10B981"/><stop offset=".5" stop-color="#14B8A6"/><stop offset="1" stop-color="#0EA5E9"/></linearGradient>
    <linearGradient id="veil" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a" stop-opacity="0"/><stop offset="1" stop-color="#0f172a" stop-opacity=".12"/></linearGradient>
    <style>
      .h{font-size:22px;font-weight:800;fill:#1c1917}
      .sub{font-size:13px;fill:#78716c}
      .lab{font-size:12px;font-weight:800;fill:#8B5CF6;letter-spacing:.12em}
      .ct{fill:#fff;font-weight:800}
      .cd{fill:#fff;opacity:.92}
      .pill{fill:#fff}
      .pillT{font-weight:800;font-size:11px}
      .note{font-size:12.5px;fill:#57534e}
    </style>
  </defs>

  <rect width="1180" height="760" fill="#faf8f5"/>
  <text x="40" y="46" class="h">Mobile teacher dashboard — “Live games” tiles</text>
  <text x="40" y="70" class="sub">Phone width ≈ 360px. Pick a direction for making the game tiles smaller on phones (desktop layout is unchanged).</text>

  <!-- ============ NOW (current) ============ -->
  <g transform="translate(40,100)">
    <rect width="320" height="600" rx="26" fill="#fff" stroke="#e7e5e4"/>
    <text x="20" y="44" class="lab">NOW · 1 COLUMN</text>
    <!-- big card 1 -->
    <g transform="translate(16,60)">
      <rect width="288" height="150" rx="22" fill="url(#qp)"/><rect width="288" height="150" rx="22" fill="url(#veil)"/>
      <circle cx="40" cy="40" r="20" fill="#ffffff" opacity=".22"/><text x="40" y="48" font-size="22" text-anchor="middle">⚡</text>
      <rect x="214" y="24" width="58" height="22" rx="11" fill="#ffffff" opacity=".22"/><text x="243" y="39" class="pillT" text-anchor="middle" fill="#fff">INSTANT</text>
      <text x="22" y="86" class="ct" font-size="20">Quick Play</text>
      <text x="22" y="108" class="cd" font-size="12">Join-by-code live game for the whole class.</text>
      <rect x="22" y="120" width="244" height="18" rx="9" fill="#fff"/><text x="144" y="133" class="pillT" text-anchor="middle" fill="#6366F1">Start ▸</text>
    </g>
    <!-- big card 2 -->
    <g transform="translate(16,222)">
      <rect width="288" height="150" rx="22" fill="url(#race)"/><rect width="288" height="150" rx="22" fill="url(#veil)"/>
      <circle cx="40" cy="40" r="20" fill="#ffffff" opacity=".22"/><text x="40" y="48" font-size="22" text-anchor="middle">🌍</text>
      <text x="22" y="86" class="ct" font-size="20">Category Race</text>
      <text x="22" y="108" class="cd" font-size="12">Pick a letter, race the class.</text>
      <rect x="22" y="120" width="244" height="18" rx="9" fill="#fff"/><text x="144" y="133" class="pillT" text-anchor="middle" fill="#9D174D">Start ▸</text>
    </g>
    <g transform="translate(16,384)" opacity=".55">
      <rect width="288" height="150" rx="22" fill="url(#speed)"/><rect width="288" height="150" rx="22" fill="url(#veil)"/>
      <text x="22" y="40" class="ct" font-size="20">Speed Round</text>
    </g>
    <text x="160" y="576" class="note" text-anchor="middle" fill="#a8a29e">…7 tall cards = long scroll</text>
  </g>

  <!-- ============ OPTION A — compact 2-up ============ -->
  <g transform="translate(420,100)">
    <rect width="320" height="600" rx="26" fill="#fff" stroke="#8B5CF6" stroke-width="2"/>
    <text x="20" y="44" class="lab">OPTION A · COMPACT 2-UP</text>
    <g font-size="11">
      <!-- row 1 -->
      <g transform="translate(16,60)">
        <rect width="138" height="120" rx="18" fill="url(#qp)"/><rect width="138" height="120" rx="18" fill="url(#veil)"/>
        <circle cx="32" cy="32" r="17" fill="#fff" opacity=".22"/><text x="32" y="39" font-size="18" text-anchor="middle">⚡</text>
        <text x="16" y="74" class="ct" font-size="14">Quick</text><text x="16" y="91" class="ct" font-size="14">Play</text>
        <rect x="16" y="98" width="106" height="14" rx="7" fill="#fff"/><text x="69" y="108" class="pillT" text-anchor="middle" fill="#6366F1">Start ▸</text>
      </g>
      <g transform="translate(166,60)">
        <rect width="138" height="120" rx="18" fill="url(#race)"/><rect width="138" height="120" rx="18" fill="url(#veil)"/>
        <circle cx="32" cy="32" r="17" fill="#fff" opacity=".22"/><text x="32" y="39" font-size="18" text-anchor="middle">🌍</text>
        <text x="16" y="74" class="ct" font-size="14">Category</text><text x="16" y="91" class="ct" font-size="14">Race</text>
        <rect x="16" y="98" width="106" height="14" rx="7" fill="#fff"/><text x="69" y="108" class="pillT" text-anchor="middle" fill="#9D174D">Start ▸</text>
      </g>
      <!-- row 2 -->
      <g transform="translate(16,190)">
        <rect width="138" height="120" rx="18" fill="url(#speed)"/><rect width="138" height="120" rx="18" fill="url(#veil)"/>
        <circle cx="32" cy="32" r="17" fill="#fff" opacity=".22"/><text x="32" y="39" font-size="18" text-anchor="middle">⚡</text>
        <text x="16" y="74" class="ct" font-size="14">Speed</text><text x="16" y="91" class="ct" font-size="14">Round</text>
        <rect x="16" y="98" width="106" height="14" rx="7" fill="#fff"/><text x="69" y="108" class="pillT" text-anchor="middle" fill="#9A3412">Start ▸</text>
      </g>
      <g transform="translate(166,190)">
        <rect width="138" height="120" rx="18" fill="url(#arena)"/><rect width="138" height="120" rx="18" fill="url(#veil)"/>
        <circle cx="32" cy="32" r="17" fill="#fff" opacity=".22"/><text x="32" y="39" font-size="18" text-anchor="middle">🏟️</text>
        <text x="16" y="74" class="ct" font-size="14">Word Hunt</text><text x="16" y="91" class="ct" font-size="14">Arena</text>
        <rect x="16" y="98" width="106" height="14" rx="7" fill="#fff"/><text x="69" y="108" class="pillT" text-anchor="middle" fill="#115E59">Start ▸</text>
      </g>
    </g>
    <text x="160" y="350" class="note" text-anchor="middle">All 4 games visible at once</text>
    <text x="160" y="372" class="note" text-anchor="middle" fill="#a8a29e">smaller cards · no description · 2 columns</text>
  </g>

  <!-- ============ OPTION B — list rows ============ -->
  <g transform="translate(800,100)">
    <rect width="320" height="600" rx="26" fill="#fff" stroke="#e7e5e4"/>
    <text x="20" y="44" class="lab">OPTION B · LIST ROWS</text>
    <g>
      <g transform="translate(16,60)">
        <rect width="288" height="58" rx="16" fill="url(#qp)"/><rect width="288" height="58" rx="16" fill="url(#veil)"/>
        <circle cx="38" cy="29" r="17" fill="#fff" opacity=".22"/><text x="38" y="36" font-size="18" text-anchor="middle">⚡</text>
        <text x="64" y="26" class="ct" font-size="14">Quick Play</text>
        <text x="64" y="44" class="cd" font-size="11">Join-by-code live game</text>
        <text x="266" y="35" fill="#fff" font-size="18" text-anchor="middle">▸</text>
      </g>
      <g transform="translate(16,126)">
        <rect width="288" height="58" rx="16" fill="url(#race)"/><rect width="288" height="58" rx="16" fill="url(#veil)"/>
        <circle cx="38" cy="29" r="17" fill="#fff" opacity=".22"/><text x="38" y="36" font-size="18" text-anchor="middle">🌍</text>
        <text x="64" y="26" class="ct" font-size="14">Category Race</text>
        <text x="64" y="44" class="cd" font-size="11">Race the class on a letter</text>
        <text x="266" y="35" fill="#fff" font-size="18" text-anchor="middle">▸</text>
      </g>
      <g transform="translate(16,192)">
        <rect width="288" height="58" rx="16" fill="url(#speed)"/><rect width="288" height="58" rx="16" fill="url(#veil)"/>
        <circle cx="38" cy="29" r="17" fill="#fff" opacity=".22"/><text x="38" y="36" font-size="18" text-anchor="middle">⚡</text>
        <text x="64" y="26" class="ct" font-size="14">Speed Round</text>
        <text x="64" y="44" class="cd" font-size="11">Fastest correct answer wins</text>
        <text x="266" y="35" fill="#fff" font-size="18" text-anchor="middle">▸</text>
      </g>
      <g transform="translate(16,258)">
        <rect width="288" height="58" rx="16" fill="url(#arena)"/><rect width="288" height="58" rx="16" fill="url(#veil)"/>
        <circle cx="38" cy="29" r="17" fill="#fff" opacity=".22"/><text x="38" y="36" font-size="18" text-anchor="middle">🏟️</text>
        <text x="64" y="26" class="ct" font-size="14">Word Hunt Arena</text>
        <text x="64" y="44" class="cd" font-size="11">Grab words on a shared map</text>
        <text x="266" y="35" fill="#fff" font-size="18" text-anchor="middle">▸</text>
      </g>
    </g>
    <text x="160" y="360" class="note" text-anchor="middle">Most compact — 4 games in ~⅓ the height</text>
    <text x="160" y="382" class="note" text-anchor="middle" fill="#a8a29e">icon · title · one-line · chevron</text>
  </g>

  <text x="40" y="744" class="note">Desktop &amp; tablet keep the current big tiles (2-up / 4-up). These options only change the phone (&lt;640px) layout.</text>
</svg>
