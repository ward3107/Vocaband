<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#312e81"/><stop offset="100%" stop-color="#a21caf"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#d946ef"/></linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#fde047"/></marker>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <text x="640" y="50" fill="#fff" font-size="28" font-weight="800" text-anchor="middle">The student journey (on their phone)</text>

  <!-- 5 phone frames -->
  <!-- 1 JOIN -->
  <g transform="translate(40,90)">
    <rect width="200" height="460" rx="30" fill="#000"/><rect x="8" y="8" width="184" height="444" rx="24" fill="url(#bg)"/>
    <text x="100" y="60" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Join</text>
    <rect x="36" y="86" width="128" height="128" rx="14" fill="#fff"/><rect x="48" y="98" width="104" height="104" fill="#1e1b4b"/>
    <text x="100" y="248" fill="#fde047" font-size="14" font-weight="700" text-anchor="middle">scan QR / code</text>
    <text x="100" y="300" font-size="36" text-anchor="middle">🐯</text>
    <text x="100" y="332" fill="#fff" font-size="13" text-anchor="middle">pick avatar + name</text>
    <g transform="translate(36,360)"><rect width="128" height="44" rx="22" fill="url(#ok)"/><text x="64" y="28" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Join ▶</text></g>
  </g>
  <line x1="248" y1="320" x2="288" y2="320" stroke="#fde047" stroke-width="4" marker-end="url(#arr)"/>

  <!-- 2 WAIT -->
  <g transform="translate(296,90)">
    <rect width="200" height="460" rx="30" fill="#000"/><rect x="8" y="8" width="184" height="444" rx="24" fill="url(#bg)"/>
    <text x="100" y="60" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Waiting</text>
    <circle cx="100" cy="230" r="54" fill="none" stroke="#a78bfa" stroke-width="8" stroke-dasharray="60 280"/>
    <text x="100" y="200" font-size="40" text-anchor="middle">⏳</text>
    <text x="100" y="320" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">You're in!</text>
    <text x="100" y="346" fill="#c4b5fd" font-size="13" text-anchor="middle">get ready…</text>
    <text x="100" y="368" fill="#c4b5fd" font-size="13" text-anchor="middle">teacher starts soon</text>
  </g>
  <line x1="504" y1="320" x2="544" y2="320" stroke="#fde047" stroke-width="4" marker-end="url(#arr)"/>

  <!-- 3 RACE -->
  <g transform="translate(552,90)">
    <rect width="200" height="460" rx="30" fill="#000"/><rect x="8" y="8" width="184" height="444" rx="24" fill="url(#bg)"/>
    <text x="100" y="56" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">⚡ RACE — 3.2s</text>
    <circle cx="100" cy="92" r="20" fill="none" stroke="#fde047" stroke-width="6" stroke-dasharray="80 45"/>
    <g filter="url(#sh)"><rect x="24" y="128" width="152" height="64" rx="14" fill="url(#card)"/></g>
    <text x="100" y="168" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">abundant</text>
    <g transform="translate(24,208)"><rect width="152" height="44" rx="12" fill="url(#ok)"/><text x="76" y="28" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">plentiful ✓</text></g>
    <g transform="translate(24,260)"><rect width="152" height="44" rx="12" fill="#ffffff" fill-opacity="0.14"/><text x="76" y="28" fill="#fff" font-size="13" text-anchor="middle">rare</text></g>
    <g transform="translate(24,312)"><rect width="152" height="44" rx="12" fill="#ffffff" fill-opacity="0.14"/><text x="76" y="28" fill="#fff" font-size="13" text-anchor="middle">tired</text></g>
    <g transform="translate(24,364)"><rect width="152" height="44" rx="12" fill="#ffffff" fill-opacity="0.14"/><text x="76" y="28" fill="#fff" font-size="13" text-anchor="middle">far away</text></g>
  </g>
  <line x1="760" y1="320" x2="800" y2="320" stroke="#fde047" stroke-width="4" marker-end="url(#arr)"/>

  <!-- 4 RESULT -->
  <g transform="translate(808,90)">
    <rect width="200" height="460" rx="30" fill="#000"/><rect x="8" y="8" width="184" height="444" rx="24" fill="url(#bg)"/>
    <text x="100" y="56" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Round result</text>
    <text x="100" y="150" font-size="56" text-anchor="middle">✅</text>
    <text x="100" y="210" fill="#5eead4" font-size="22" font-weight="800" text-anchor="middle">Correct!</text>
    <g transform="translate(40,236)"><rect width="120" height="40" rx="20" fill="#fbbf24"/><text x="60" y="26" fill="#451a03" font-size="15" font-weight="800" text-anchor="middle">+47 ⚡</text></g>
    <text x="100" y="312" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">You were 2nd!</text>
    <text x="100" y="338" fill="#c4b5fd" font-size="13" text-anchor="middle">Daniel beat you by 0.3s</text>
    <text x="100" y="380" fill="#fde047" font-size="13" text-anchor="middle">next word in 3…</text>
  </g>
  <line x1="1016" y1="320" x2="1056" y2="320" stroke="#fde047" stroke-width="4" marker-end="url(#arr)"/>

  <!-- 5 FINAL -->
  <g transform="translate(1064,90)">
    <rect width="200" height="460" rx="30" fill="#000"/><rect x="8" y="8" width="184" height="444" rx="24" fill="url(#bg)"/>
    <text x="100" y="56" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">🏆 Final</text>
    <text x="100" y="140" font-size="50" text-anchor="middle">🥈</text>
    <text x="100" y="190" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">2nd place!</text>
    <text x="100" y="216" fill="#a7f3d0" font-size="15" text-anchor="middle">312 points</text>
    <g transform="translate(28,250)" font-size="12" fill="#fff">
      <text x="0" y="14">🥇 Daniel  503</text>
      <text x="0" y="40" font-weight="700">🥈 You      312</text>
      <text x="0" y="66">🥉 Noa      298</text>
    </g>
    <g transform="translate(28,340)"><rect width="144" height="40" rx="20" fill="#8b5cf6"/><text x="72" y="26" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">+312 XP earned</text></g>
    <text x="100" y="412" fill="#c4b5fd" font-size="12" text-anchor="middle">saved to your account</text>
  </g>

  <text x="640" y="600" fill="#94a3b8" font-size="15" text-anchor="middle">Join → Wait → Race → See result → repeat → Final. The join screen + XP saving already exist; the Race/Result screens are the new student UI.</text>
</svg>
