<svg xmlns="http://www.w3.org/2000/svg" width="430" height="880" viewBox="0 0 430 880" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="55%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- phone frame -->
  <rect x="6" y="6" width="418" height="868" rx="46" fill="#000"/>
  <rect x="14" y="14" width="402" height="852" rx="40" fill="url(#bg)"/>
  <rect x="170" y="26" width="90" height="22" rx="11" fill="#000"/>

  <!-- header -->
  <text x="40" y="92" fill="#fff" font-size="22" font-weight="700">⚡ Speed Round</text>
  <text x="40" y="118" fill="#c4b5fd" font-size="14">Word 4 / 12 · streak x2 🔥</text>

  <!-- countdown ring -->
  <g transform="translate(215,210)">
    <circle r="74" fill="#ffffff" fill-opacity="0.08"/>
    <circle r="74" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="14"/>
    <circle r="74" fill="none" stroke="#fde047" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="464.9" stroke-dashoffset="160" transform="rotate(-90)"/>
    <text x="0" y="2" fill="#fff" font-size="42" font-weight="800" text-anchor="middle">3.2</text>
    <text x="0" y="30" fill="#fde047" font-size="14" font-weight="600" text-anchor="middle">seconds</text>
  </g>

  <!-- word card -->
  <g filter="url(#sh)">
    <rect x="40" y="318" width="350" height="150" rx="26" fill="url(#card)"/>
  </g>
  <text x="215" y="372" fill="#ede9fe" font-size="14" font-weight="600" text-anchor="middle">WHAT DOES THIS MEAN?</text>
  <text x="215" y="430" fill="#fff" font-size="46" font-weight="800" text-anchor="middle">abundant</text>

  <!-- answer options -->
  <g font-size="18" font-weight="600">
    <g transform="translate(40,496)">
      <rect width="350" height="62" rx="18" fill="url(#ok)" filter="url(#sh)"/>
      <text x="24" y="38" fill="#fff">existing in large amounts ✓</text>
    </g>
    <g transform="translate(40,568)">
      <rect width="350" height="62" rx="18" fill="#ffffff" fill-opacity="0.12"/>
      <text x="24" y="38" fill="#fff">very rare or scarce</text>
    </g>
    <g transform="translate(40,640)">
      <rect width="350" height="62" rx="18" fill="#ffffff" fill-opacity="0.12"/>
      <text x="24" y="38" fill="#fff">extremely tired</text>
    </g>
    <g transform="translate(40,712)">
      <rect width="350" height="62" rx="18" fill="#ffffff" fill-opacity="0.12"/>
      <text x="24" y="38" fill="#fff">far away</text>
    </g>
  </g>

  <!-- live rank pill -->
  <g transform="translate(40,798)">
    <rect width="350" height="48" rx="24" fill="#ffffff" fill-opacity="0.14"/>
    <text x="24" y="31" fill="#fff" font-size="16" font-weight="700">You're #3</text>
    <text x="200" y="31" fill="#fde047" font-size="16" font-weight="700">⚡ answer fast = more pts</text>
  </g>
</svg>
