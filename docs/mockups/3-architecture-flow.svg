<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#d946ef"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c4b5fd"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5eead4"/></marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="48" y="56" fill="#fff" font-size="30" font-weight="700">Speed Round — how it flows (reuses your existing stack)</text>
  <text x="48" y="86" fill="#94a3b8" font-size="17">socket.io on the /quick-play namespace · server-authoritative scoring · nothing new to deploy</text>

  <!-- Three lanes -->
  <!-- Teacher -->
  <g filter="url(#sh)"><rect x="48" y="120" width="300" height="90" rx="18" fill="url(#amber)"/></g>
  <text x="198" y="160" fill="#fff" font-size="22" font-weight="800" text-anchor="middle">👩‍🏫 Teacher screen</text>
  <text x="198" y="188" fill="#fff7ed" font-size="15" text-anchor="middle">LiveChallengeView · podium</text>

  <!-- Server -->
  <g filter="url(#sh)"><rect x="490" y="120" width="300" height="90" rx="18" fill="url(#violet)"/></g>
  <text x="640" y="160" fill="#fff" font-size="22" font-weight="800" text-anchor="middle">⚙️ Fly.io server.ts</text>
  <text x="640" y="188" fill="#ede9fe" font-size="15" text-anchor="middle">qpSessions (in-memory room)</text>

  <!-- Students -->
  <g filter="url(#sh)"><rect x="932" y="120" width="300" height="90" rx="18" fill="url(#teal)"/></g>
  <text x="1082" y="160" fill="#fff" font-size="22" font-weight="800" text-anchor="middle">📱 Students (all)</text>
  <text x="1082" y="188" fill="#ecfdf5" font-size="15" text-anchor="middle">QuickPlayStudentView</text>

  <!-- lifelines -->
  <line x1="198" y1="210" x2="198" y2="690" stroke="#475569" stroke-width="2" stroke-dasharray="4 6"/>
  <line x1="640" y1="210" x2="640" y2="690" stroke="#475569" stroke-width="2" stroke-dasharray="4 6"/>
  <line x1="1082" y1="210" x2="1082" y2="690" stroke="#475569" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- step 1: start -->
  <line x1="198" y1="260" x2="632" y2="260" stroke="#c4b5fd" stroke-width="3" marker-end="url(#arr)"/>
  <text x="210" y="250" fill="#e9d5ff" font-size="15" font-weight="600">RACE_START  (pick word, set deadlineTs)</text>

  <!-- step 2: broadcast round to everyone -->
  <line x1="640" y1="310" x2="1074" y2="310" stroke="#5eead4" stroke-width="3" marker-end="url(#arrG)"/>
  <line x1="640" y1="310" x2="206" y2="310" stroke="#5eead4" stroke-width="3" marker-end="url(#arrG)"/>
  <text x="660" y="300" fill="#99f6e4" font-size="15" font-weight="600">RACE_ROUND  → same word + countdown to whole room</text>

  <!-- step 3: students submit -->
  <line x1="1082" y1="370" x2="648" y2="370" stroke="#c4b5fd" stroke-width="3" marker-end="url(#arr)"/>
  <text x="700" y="360" fill="#e9d5ff" font-size="15" font-weight="600">RACE_SUBMIT  {answer}  (race!)</text>

  <!-- server scoring note -->
  <g filter="url(#sh)"><rect x="470" y="392" width="340" height="96" rx="16" fill="#ffffff" fill-opacity="0.07"/></g>
  <text x="490" y="420" fill="#fde047" font-size="15" font-weight="700">Server scores (trusts ITS clock):</text>
  <text x="490" y="444" fill="#e2e8f0" font-size="14">• correct? + arrival rank</text>
  <text x="490" y="466" fill="#e2e8f0" font-size="14">• speedBonus ∝ (deadline − receivedAt)</text>

  <!-- step 4: leaderboard broadcast -->
  <line x1="640" y1="540" x2="1074" y2="540" stroke="#5eead4" stroke-width="3" marker-end="url(#arrG)"/>
  <line x1="640" y1="540" x2="206" y2="540" stroke="#5eead4" stroke-width="3" marker-end="url(#arrG)"/>
  <text x="660" y="530" fill="#99f6e4" font-size="15" font-weight="600">LEADERBOARD  (throttled 1.5s) → podium reanimates</text>

  <!-- step 5 loop -->
  <line x1="198" y1="595" x2="632" y2="595" stroke="#c4b5fd" stroke-width="3" marker-end="url(#arr)"/>
  <text x="210" y="585" fill="#e9d5ff" font-size="15" font-weight="600">▶ Next word  (auto or manual) — loop until set is done</text>

  <!-- persistence -->
  <g filter="url(#sh)"><rect x="490" y="628" width="300" height="74" rx="16" fill="#1e293b"/></g>
  <text x="640" y="660" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">🗄 Supabase</text>
  <text x="640" y="686" fill="#94a3b8" font-size="14" text-anchor="middle">TEACHER_END → persist progress rows</text>
  <line x1="640" y1="595" x2="640" y2="624" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <text x="640" y="740" fill="#64748b" font-size="14" text-anchor="middle">Cloudflare Worker proxies /socket.io/* → Fly.io · WebSocket-only · multi-VM fanout already handled</text>
</svg>
