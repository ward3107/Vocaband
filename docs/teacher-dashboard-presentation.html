<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vocaband — Teacher Dashboard</title>
<style>
  :root{
    --hero1:#8b5cf6; --hero2:#a855f7; --hero3:#d946ef;
    --shop1:#ec4899; --shop2:#f43f5e;
    --xp1:#f59e0b; --xp2:#f97316;
    --prog1:#10b981; --prog2:#14b8a6;
    --ink:#1e1b2e; --muted:#6b6880; --bg:#0e0b1d; --card:#ffffff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Hebrew","Noto Sans Arabic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0e0b1d;color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;}
  svg{width:1em;height:1em;display:block;}

  /* deck shell */
  .deck{position:fixed;inset:0;}
  .slide{
    position:absolute;inset:0;display:none;flex-direction:column;
    padding:5vh 6vw;background:#f6f5fb;overflow:auto;
  }
  .slide.active{display:flex;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  /* top controls */
  .controls{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;justify-content:space-between;
    align-items:center;padding:10px 16px;pointer-events:none;}
  .langbar{display:flex;gap:6px;pointer-events:auto;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
    padding:5px;border-radius:999px;box-shadow:0 6px 20px -10px rgba(0,0,0,.4);}
  .langbar button{border:0;cursor:pointer;font-size:13px;font-weight:700;padding:6px 14px;border-radius:999px;
    color:var(--muted);background:transparent;transition:.15s;}
  .langbar button.active{color:#fff;background:linear-gradient(135deg,var(--hero1),var(--hero3));}
  .counter{pointer-events:auto;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);font-weight:700;
    font-size:13px;color:var(--muted);padding:7px 14px;border-radius:999px;}

  /* nav arrows */
  .arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:60;width:46px;height:46px;border:0;cursor:pointer;
    border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 8px 24px -10px rgba(0,0,0,.5);
    display:grid;place-items:center;font-size:22px;color:var(--hero2);}
  .arrow.prev{left:14px;} .arrow.next{right:14px;}
  .arrow:hover{background:#fff;}

  /* title slide */
  .title-slide{background:linear-gradient(135deg,#3b0764,#6d28d9 50%,#a21caf);color:#fff;
    align-items:center;justify-content:center;text-align:center;}
  .brand{display:flex;align-items:center;gap:16px;margin-bottom:26px;}
  .brand .mark{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;
    background:linear-gradient(135deg,#8b5cf6,#a855f7,#d946ef);box-shadow:0 12px 40px -10px rgba(217,70,239,.7);}
  .brand .mark span{font-family:"Arial Black",Arial,sans-serif;font-weight:900;font-style:italic;
    font-size:48px;color:#fff;transform:rotate(8deg);}
  .brand .wd{font-size:30px;font-weight:800;letter-spacing:.02em;}
  .title-slide h1{font-size:clamp(34px,6vw,62px);font-weight:800;line-height:1.05;max-width:14ch;}
  .title-slide p{font-size:clamp(16px,2.3vw,22px);max-width:60ch;margin-top:16px;opacity:.94;}
  .stats{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:38px;}
  .stat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:18px;
    padding:16px 22px;min-width:140px;}
  .stat .num{font-size:34px;font-weight:800;}
  .stat .lbl{font-size:13px;opacity:.85;font-weight:600;}

  /* content slide header */
  .shead{margin-bottom:22px;}
  .shead .kicker{font-size:13px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--shop1);}
  .shead h2{font-size:clamp(26px,4vw,40px);font-weight:800;margin-top:4px;color:var(--ink);}
  .shead .sub{color:var(--muted);font-size:clamp(15px,2vw,19px);margin-top:6px;}

  /* feature cards */
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));align-content:start;}
  .card{background:var(--card);border-radius:20px;padding:20px;border:1px solid rgba(124,58,237,.08);
    box-shadow:0 12px 30px -20px rgba(30,27,46,.4);}
  .card .ico{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:26px;
    color:#fff;margin-bottom:13px;}
  .card h3{font-size:18px;font-weight:800;margin-bottom:6px;color:var(--ink);}
  .card p{font-size:14.5px;color:var(--muted);line-height:1.5;}
  .g-hubs .ico{background:linear-gradient(135deg,var(--hero1),var(--hero3));}
  .g-class .ico{background:linear-gradient(135deg,var(--prog1),var(--prog2));}
  .g-act .ico{background:linear-gradient(135deg,var(--xp1),var(--xp2));}
  .g-live .ico{background:linear-gradient(135deg,var(--shop1),var(--shop2));}
  .g-set .ico{background:linear-gradient(135deg,#6366f1,#0ea5e9);}

  /* modes */
  .modes{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));align-content:start;}
  .mode{background:var(--card);border-radius:14px;padding:13px 15px;display:flex;gap:11px;align-items:center;
    border:1px solid rgba(124,58,237,.08);box-shadow:0 8px 20px -16px rgba(30,27,46,.4);}
  .mode .me{font-size:22px;color:var(--hero2);flex:0 0 auto;}
  .mode b{display:block;font-size:14.5px;color:var(--ink);}
  .mode span{font-size:12.5px;color:var(--muted);}

  /* closing */
  .close-slide{background:linear-gradient(135deg,var(--shop1),#be123c,#7c3aed);color:#fff;
    align-items:center;justify-content:center;text-align:center;}
  .close-slide h2{font-size:clamp(30px,5vw,52px);font-weight:800;max-width:16ch;}
  .close-slide p{font-size:clamp(16px,2.3vw,22px);max-width:62ch;margin-top:16px;opacity:.95;}
  .close-slide .brand{margin-top:30px;}

  /* RTL */
  [dir="rtl"] .card .ico{margin-inline-start:0;}
  [dir="rtl"] .mode{flex-direction:row-reverse;text-align:right;}
  [dir="rtl"] .arrow.prev{left:auto;right:14px;}
  [dir="rtl"] .arrow.next{right:auto;left:14px;}

  /* PRINT → one slide per page (perfect for Save as PDF) */
  @page{size:1280px 720px;margin:0;}
  @media print{
    body{overflow:visible;}
    .controls,.arrow{display:none !important;}
    .deck{position:static;}
    .slide{display:flex !important;position:relative;inset:auto;width:1280px;height:720px;
      page-break-after:always;break-after:page;overflow:hidden;animation:none;}
    .grid,.modes{overflow:hidden;}
  }
</style>
</head>

function ic(k){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(IC[k]||"")+'</svg>';}

const brand = '<div class="brand"><div class="mark"><span>V</span></div><div class="wd">Vocaband</div></div>';
let slides=[], idx=0, lang="en";

function build(l){
  const d=DATA[l];
  document.documentElement.lang=l; document.documentElement.dir=d.dir;
  const S=[];
  // 1 title
  S.push('<section class="slide title-slide">'+brand+'<h1>'+d.heroTitle+'</h1><p>'+d.heroSub+'</p>'+
    '<div class="stats">'+d.stats.map(s=>'<div class="stat"><div class="num">'+s[0]+'</div><div class="lbl">'+s[1]+'</div></div>').join('')+'</div></section>');
  // group slides
  d.groups.forEach(g=>{
    S.push('<section class="slide '+g.cls+'">'+
      '<div class="shead"><div class="kicker">'+g.kicker+'</div><h2>'+g.title+'</h2><div class="sub">'+g.sub+'</div></div>'+
      '<div class="grid">'+g.features.map(f=>'<div class="card"><div class="ico">'+ic(f[0])+'</div><h3>'+f[1]+'</h3><p>'+f[2]+'</p></div>').join('')+'</div></section>');
  });
  // modes slide
  S.push('<section class="slide">'+
    '<div class="shead"><div class="kicker">THE FUN PART</div><h2>'+d.modesTitle+'</h2><div class="sub">'+d.modesSub+'</div></div>'+
    '<div class="modes">'+d.modes.map(m=>'<div class="mode"><div class="me">'+ic(m[0])+'</div><div><b>'+m[1]+'</b><span>'+m[2]+'</span></div></div>').join('')+'</div></section>');
  // closing
  S.push('<section class="slide close-slide"><h2>'+d.closeTitle+'</h2><p>'+d.closeSub+'</p>'+brand+'</section>');

  document.getElementById("deck").innerHTML=S.join('');
  slides=[...document.querySelectorAll(".slide")];
  if(idx>=slides.length) idx=slides.length-1;
  show(idx);
}
function show(i){
  idx=Math.max(0,Math.min(i,slides.length-1));
  slides.forEach((s,n)=>s.classList.toggle("active",n===idx));
  document.getElementById("counter").textContent=(idx+1)+" / "+slides.length;
}
document.getElementById("next").onclick=()=>show(idx+1);
document.getElementById("prev").onclick=()=>show(idx-1);
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown"){e.preventDefault();show(idx+1);}
  if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();show(idx-1);}
});
document.getElementById("langbar").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  document.querySelectorAll("#langbar button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); lang=b.dataset.lang; build(lang);
});
build("en");
</script>
