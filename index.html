<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#059669" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- SEO — globally-positioned, CEFR-aligned. Previously pinned to
         "Israeli Ministry of Education Band 1 & 2" which told Google
         the site was region-specific; non-Israeli search regions then
         de-prioritised it. CEFR (A1-B2) is the international standard
         every ESL teacher recognises and is safe to reference without
         any licensing. Hebrew + Arabic strings kept in the keywords
         list as a bonus signal for the existing Israeli audience. -->
    <title>Vocaband — Gamified English Vocabulary for Students & Schools | CEFR A1–B2</title>
    <meta name="description" content="Vocaband makes learning English vocabulary fun for ESL students across school — Grades 1 to 12, CEFR A1 to B2. 9,000+ words, 10 game modes, live class challenges, XP, streaks, and avatars. Free for teachers to create a class, no per-student fees. Works on any phone — no download needed." />
    <meta name="keywords" content="English vocabulary app, ESL vocabulary, CEFR A1 A2 B1 B2, gamified English, English games for kids, learn English, vocabulary games for students, English practice for teachers, ESL classroom tool, English flashcards, CEFR-aligned English, English for teenagers, vocabulary builder, English homework help, classroom leaderboard, free English app, אנגלית לילדים, משחקי אנגלית, מורה לאנגלית, تعلم الانجليزية للأطفال, مفردات انجليزية" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Vocaband" />
    <!-- Removed geo.region / geo.placename — were hard-targeting Israel only -->
    <meta name="language" content="English, Hebrew, Arabic" />
    <link rel="canonical" href="https://www.vocaband.com" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.vocaband.com" />
    <meta property="og:title" content="Vocaband — Gamified English Vocabulary for Students & Schools" />
    <meta property="og:description" content="9,000+ English words across CEFR A1–B2. 10 game modes, live class challenges, XP & streaks. Free for teachers to create a class — no download." />
    <meta property="og:image" content="https://www.vocaband.com/og-image.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Vocaband" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vocaband — Gamified English Vocabulary, CEFR A1–B2" />
    <meta name="twitter:description" content="9,000+ English words, 10 game modes, live class leaderboards. Free for teachers to create a class." />
    <meta name="twitter:image" content="https://www.vocaband.com/og-image.png" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Vocaband",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web, iOS, Android",
      "url": "https://www.vocaband.com",
      "description": "Gamified English vocabulary platform for ESL students aged 10-15. 9,000+ words aligned with CEFR A1-B2 levels, 10 game modes, live class challenges, XP + streaks.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student"
      },
      "inLanguage": ["en", "he", "ar"],
      "educationalLevel": "CEFR A1 to B2 (elementary through upper-intermediate)",
      "about": "English vocabulary learning aligned with CEFR A1-B2 levels"
    }
    </script>
    <!-- Favicon — multiple sizes for Google search, browser tabs, and home-screen installs.
         Order matters: browsers + Google's crawler both look at /favicon.ico FIRST before
         parsing the HTML, so the .ico packs the full circular-gradient V across 16-256px.
         The SVG gives crisp rendering in supporting clients; the PNGs cover older browsers
         and the Android home-screen install path. Version bumped to v3 to defeat CDN +
         browser caches of the previous square-blue icon. -->
    <link rel="icon" href="/favicon.ico?v=3" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=3" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=3" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=3" />
    <link rel="apple-touch-icon" href="/icon-192.png?v=3" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <!-- Kill any existing service workers that may be serving stale content -->
    <script src="/sw-cleanup.js"></script>
    <!-- WCAG 2.0 AA Skip Navigation Links (2.4.1) -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <a href="#navigation" class="skip-link">Skip to navigation</a>

    <!-- Main application content with landmark -->
    <!-- First-paint skeleton: hand-crafted static hero that matches
         src/components/LandingPage.tsx visually, so visitors from
         Google see the real landing instantly.  React replaces this
         tree on hydrate.  Keep the visual close to LandingPage.tsx
         (gradient, V logo, headline, two CTAs) so the handoff looks
         like a redraw, not a page change.  If you change the React
         hero copy, update this copy too.  All styles inline so the
         skeleton renders before the Tailwind CSS bundle arrives. -->
    <div id="root"><div id="boot-skeleton" style="min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 35%,#db2777 100%);color:#fff;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;overflow:hidden"><nav style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;max-width:1280px;width:100%;margin:0 auto;box-sizing:border-box"><div style="display:flex;align-items:center;gap:.75rem"><div style="width:2.25rem;height:2.25rem;border-radius:.75rem;background:linear-gradient(135deg,#8b5cf6,#d946ef);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(139,92,246,.4)"><span style="color:#fff;font-weight:900;font-size:1.35rem;font-style:italic;line-height:1">V</span></div><span style="font-size:1.4rem;font-weight:900;letter-spacing:-0.02em">Vocaband</span></div></nav><main style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem 4rem"><div style="max-width:720px;text-align:center"><h1 style="font-size:clamp(2.5rem,7vw,4.5rem);font-weight:900;font-style:italic;line-height:1.05;margin:0 0 1.5rem;letter-spacing:-0.02em"><span style="display:inline-block">Level Up</span><br><span style="display:inline-block;background:linear-gradient(90deg,#c4b5fd,#f0abfc,#fbbf24);-webkit-background-clip:text;background-clip:text;color:transparent">Your Vocabulary</span></h1><p style="font-size:clamp(1rem,1.8vw,1.25rem);opacity:.85;max-width:36rem;margin:0 auto 2rem;line-height:1.5">The digital playground where ESL students become vocabulary legends through play.</p><div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap"><div style="padding:1rem 2rem;background:linear-gradient(135deg,#8b5cf6,#a855f7,#d946ef);border-radius:1rem;color:#fff;font-size:1.15rem;font-weight:900;box-shadow:0 10px 0 0 #6d28d9,0 20px 40px rgba(139,92,246,.4);display:flex;align-items:center;gap:.5rem">Start Learning</div><div style="padding:1rem 1.5rem;background:linear-gradient(135deg,#0ea5e9,#3b82f6,#06b6d4);border-radius:1rem;color:#fff;font-size:1.05rem;font-weight:700;box-shadow:0 10px 0 0 #0369a1,0 20px 40px rgba(14,165,233,.4);display:flex;align-items:center;gap:.5rem">Teacher Login</div></div></div></main></div></div>
    <script>
      // If React fails to mount, overwrite the skeleton with an error
      // panel so the user sees *something* diagnostic instead of a
      // permanently static hero.
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root) root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem"><div style="text-align:center;max-width:600px;font-family:system-ui,sans-serif"><h2 style="color:#dc2626">App Error</h2><pre style="text-align:left;background:#f5f5f5;padding:1em;border-radius:8px;overflow:auto;font-size:12px">' + (e.message || 'Unknown error') + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '</pre></div></div>';
      });
    </script>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;padding:2rem;text-align:center">
        <div>
          <h1 style="font-size:1.5rem;margin-bottom:0.5rem">JavaScript Required</h1>
          <p style="color:#6b7280">Vocaband requires JavaScript to run. Please enable it in your browser settings.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
