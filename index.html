<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- SEO -->
    <title>Vocaband – Gamified English Vocabulary for Israeli Students</title>
    <meta name="description" content="Vocaband is a gamified vocabulary learning app based on the Israeli Band 2 English curriculum. Practice words, earn XP, and compete with classmates." />
    <!-- Tell Google which URL is canonical so it indexes www.vocaband.com, not the Render URL -->
    <link rel="canonical" href="https://www.vocaband.com" />

    <!-- Open Graph (social sharing & richer Google results) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.vocaband.com" />
    <meta property="og:title" content="Vocaband – Gamified English Vocabulary" />
    <meta property="og:description" content="Practice Band 2 vocabulary, earn XP, and compete with your class in real time." />
    <meta property="og:image" content="https://www.vocaband.com/icon.svg" />

    <!-- Favicon – used by browsers and picked up by Google Search -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
