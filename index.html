    <!-- FAQPage schema — opts the landing-page FAQ section into
         Google's rich-result FAQ snippet. When Google trusts the
         schema, the search-result card expands to show the Q&As
         inline (each question collapsible), which dramatically
         increases CTR + the result's vertical real estate. Content
         here MUST match the visible FAQ on the page (LandingFAQ.tsx
         + src/locales/student/faq.ts EN copy) — Google penalizes
         pages where the schema lies about content. Strings kept in
         English: rich-result snippets render in the searcher's

         in their own language still get the localized title +

    <!-- Favicon — multiple sizes for Google search, browser tabs, and home-screen installs.
         Order matters: browsers + Google's crawler both look at /favicon.ico FIRST before
         parsing the HTML, so the .ico packs the full circular-gradient V across 16-256px.
         The SVG gives crisp rendering in supporting clients; the PNGs cover older browsers
         and the Android home-screen install path. Version bumped to v3 to defeat CDN +
         browser caches of the previous square-blue icon. -->
    <link rel="icon" href="/favicon.ico?v=3" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=3" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=3" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=3" />
    <link rel="apple-touch-icon" href="/icon-192.png?v=3" />
    <!-- Pre-React boot styles (loader + noscript fallback).
         vite.config.ts's vocabandHtmlPerf plugin inlines /public/boot.css
         here at build time as a <style> block so the initial render
         doesn't pay a network round-trip for ~900 bytes of loader CSS on
         Slow 4G. CSP allows inline styles (`style-src-elem 'unsafe-inline'`).
         In `vite dev` the placeholder below stays as-is and the dev server
         serves /boot.css normally — the inline-CSS effect only matters
         under production network latency. -->
    <!-- VOCABAND_INLINE_BOOT_CSS -->
    <link rel="stylesheet" href="/boot.css" />
    <!-- Latin fonts (Plus Jakarta Sans + Be Vietnam Pro) are self-hosted
         from /public/fonts and declared via @font-face in src/index.css.
         No request to fonts.googleapis.com / fonts.gstatic.com is made
         for them.  See PR #787 follow-up (privacy review item #5).

         RTL fonts (Heebo + Fredoka) are still lazy-loaded from Google
         Fonts when the visitor's language is HE/AR — boot-debug.js
         injects a <link> built from the meta tag below.  The preconnects
         remain to warm the TLS handshake for that case; on EN-only
         sessions the preconnect costs ~one cheap DNS lookup and is
         dropped by the browser if it's never followed.  When Heebo +
         Fredoka are also self-hosted (future PR) these can disappear
         entirely. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Supabase auth + REST + storage origin.  Pre-warming the TLS
         handshake here knocks ~80–200 ms off the FIRST request the
         supabase-js client makes (auth.getSession on bootstrap), which
         used to land in the user's critical path on every cold visit.
         Especially valuable on weak school Wi-Fi where the TLS round-
         trips dominate.  See R4 in docs/SCHOOL-PERFORMANCE-PLAN.md. -->
    <link rel="preconnect" href="https://auth.vocaband.com" crossorigin />
    <!-- Pre-computed RTL fonts URL so boot-debug.js can inject it as a
         single <link> without string-building. Kept as a meta tag so
         CSP `style-src` doesn't have to allow inline href construction. -->
    <meta name="vocaband-rtl-fonts" content="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;900&family=Fredoka:wght@400;500;600;700&display=swap" />
    <!-- Material Symbols link was removed: the font was loaded on every
         page but never actually rendered (lucide-react is used
         exclusively for icons).  On school networks that block
         fonts.googleapis.com/Material+Symbols it surfaced as a visible
         ERR_FAILED in devtools and wasted a request otherwise. -->
  </head>
