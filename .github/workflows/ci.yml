# CI — runs on every pull request + every push to main.
#
# Goals:
#   - Catch type errors before they hit main (vite build doesn't fail
#     on TS errors in dev mode; tsc --noEmit does)
#   - Catch broken unit tests before merge
#   - Catch broken builds before merge — the Speed Round PR (#415)
#     accidentally dropped its wiring during merge resolution and
#     the loss only surfaced when the next branch was being built.
#     A passing build here would have caught it.
#
# What this does NOT do (intentionally, for v1):
#   - Run Playwright e2e on every PR (~3 min, requires browser deps,
#     better as a separate optional job).  See ci-e2e.yml for the
#     dedicated e2e workflow that runs on a different cadence.
#   - Lint as a hard gate (eslint warnings are noisy enough that
#     blocking PRs would slow the team without a curated rule set).
#     `npm run lint` is in scripts and easy to run locally.

name: CI

# Least-privilege permissions — workflow only checks out code and
# runs tests, no need to write to issues / PRs / packages / etc.
# CodeQL flags missing top-level permissions as a security warning;
# this block is the recommended fix.
permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Allow manual runs from the Actions tab — useful when re-running a
  # failed job after a flaky network blip without waiting for a new
  # commit.
  workflow_dispatch:

# Cancel any in-flight CI run for the same branch when a new push
# arrives — saves CI minutes on rapid push-rebase loops without
# hiding the latest result.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Single combined job — install once, then run every check against
  # that install.  Splitting into multiple jobs would re-install
  # dependencies for each, which is the slowest part of the pipeline.
  build-test:
    name: Typecheck + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Security gate — fail the build on HIGH or CRITICAL CVEs in the
      # dependency tree.  Moderate/low are surfaced (Dependabot files
      # PRs, see .github/dependabot.yml) but don't block merges, so the
      # team can triage at human pace without a perpetually-red CI.
      #
      # If a high-severity issue lands in a transitive dep, fix via
      # `package.json#overrides` rather than waiting for the upstream
      # to bump (see commit `<sha>` for the ip-address override
      # template).
      - name: Audit dependencies (fails on high/critical)
        run: npm audit --omit=dev --audit-level=high

      # tsc --noEmit catches TS errors that vite build silently lets
      # through (esbuild is more lenient than tsc on missing names
      # and type mismatches).
      #
      # Was previously NON-BLOCKING because main carries ~85 pre-
      # existing typecheck failures inherited from PRs merged before
      # CI existed.  Going BLOCKING outright would have stopped every
      # PR until that backlog was cleared.
      #
      # Switched 2026-05-04 to a RATCHET: the existing count is the
      # baseline (`.typecheck-baseline`).  CI now fails if a PR
      # increases the count.  Cleanup PRs that drive the count down
      # are encouraged to commit the new lower baseline in the same
      # PR — the ratchet only goes down.  See
      # `scripts/typecheck-ratchet.sh` for the full logic.
      #
      # Net effect: new code is held to the strict standard, old code
      # becomes a measurable backlog.  PR #458's three regressions
      # (FeatureRequestModal duplicate JSX attr, AccessibilityStatement
      # missing prop, CreateAssignmentWizard arg mismatch) would have
      # been blocked under this gate.
      - name: Typecheck (ratchet — fails on regression)
        run: ./scripts/typecheck-ratchet.sh

      # Vitest runs all unit tests in src/__tests__/.  No watch mode,
      # CI-only flags handled by `npm run test` (= `vitest run`).
      - name: Unit tests
        run: npm test

      # Production build — catches anything tsc + tests miss
      # (manifest issues, unresolvable imports, broken dynamic chunks).
      - name: Build
        run: npm run build

      # Surface the build artifact size so PRs that bloat the bundle
      # are visible at review time.  Output appears in the GH Actions
      # log; failure threshold isn't enforced (warning only).
      - name: Bundle size
        if: always()
        run: |
          if [ -d dist/assets ]; then
            echo "## Bundle size" >> $GITHUB_STEP_SUMMARY
            du -sh dist/assets/*.js | sort -rh | head -10 >> $GITHUB_STEP_SUMMARY
          fi

      # Cloudflare IP allowlist staleness check.  The static list under
      # config/cloudflare-ips.ts is the fallback for the Fly ingress
      # filter; if it drifts from upstream's published ranges, the
      # allowlist starts rejecting legitimate Cloudflare traffic.
      # Warning-only — surfaces the drift in the step summary; doesn't
      # block PRs (a maintainer reruns the refresh script).
      - name: Cloudflare IP-list freshness
        if: always()
        continue-on-error: true
        run: |
          set -eu
          UPSTREAM_V4=$(curl -fsS https://www.cloudflare.com/ips-v4)
          STATIC_V4=$(grep -oE '"[0-9.]+/[0-9]+"' config/cloudflare-ips.ts | tr -d '"' | grep -v ':')
          MISSING_V4=$(comm -23 <(echo "$UPSTREAM_V4" | sort -u) <(echo "$STATIC_V4" | sort -u) || true)
          if [ -n "$MISSING_V4" ]; then
            {
              echo "## ⚠️  Cloudflare IP list drifted";
              echo "Run \`npx tsx scripts/refresh-cloudflare-ips.ts\` and commit the result.";
              echo;
              echo "Ranges present upstream but missing locally:";
              echo '```';
              echo "$MISSING_V4";
              echo '```';
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # RLS regression check — runs the security pen-test script
      # against production Supabase + the Cloudflare-fronted Express
      # app.  Every probe is designed to be REJECTED at the RLS or
      # auth layer; if any one returns success, an RLS policy or auth
      # gate regressed and we MUST NOT merge.
      #
      # Non-mutating by construction: all writes are expected to fail,
      # all reads are expected to return [] under anon role.  ~9-18
      # HTTP requests per run, negligible production load.
      #
      # SUPABASE_URL + SUPABASE_ANON_KEY default to the in-repo
      # fallbacks (src/core/supabase.ts — the same publishable values
      # that ship in every browser bundle).  Override via repo secrets
      # if you ever need to point at a staging project.
      - name: RLS pen-test (hard gate)
        # Use literal publishable values for CI. The publishable anon key is
        # already shipped in every browser bundle (see src/core/supabase.ts),
        # so it doesn't need a secret indirection — and a stale repo secret
        # silently overrode an updated in-source fallback in May 2026 (see
        # PR #844). Drop the override; future rotations are one in-repo edit.
        # If a staging deployment ever needs different values, branch this
        # step into its own matrix entry rather than re-introducing secrets.
        env:
          SUPABASE_URL: 'https://auth.vocaband.com'
          ANON_KEY: 'sb_publishable_Pw-mQ9L76U5T-wLdKjOkpg_GnG99XDF'
          APP_URL: 'https://www.vocaband.com'
        run: |
          chmod +x scripts/security-pen-test.sh
          # Capture output so we can promote FAIL lines to GitHub Actions
          # annotations (visible in the run summary even without auth).
          set +e
          bash scripts/security-pen-test.sh | tee pen-test.log
          status=${PIPESTATUS[0]}
          set -e
          # Surface every FAIL line as an annotation, plus the result line.
          grep -E '^\s*FAIL ' pen-test.log | while IFS= read -r line; do
            echo "::error::pen-test ${line## }"
          done
          tail -1 pen-test.log | grep -E '^Results:' | while IFS= read -r line; do
            echo "::notice::${line}"
          done
          exit "$status"

      # Complementary SAST — CodeQL (configured at repo level via Default
      # Setup) covers most patterns, but Semgrep's curated security-audit
      # ruleset catches different classes (express-misconfig, jwt-misuse,
      # supabase patterns).  Installed via pip rather than the archived
      # `semgrep/semgrep-action@v1` (the action was deprecated; the CLI is
      # the supported integration path).  Warning-only — bad rules in a
      # ruleset shouldn't block merges.
      - name: Semgrep SAST
        if: always()
        continue-on-error: true
        run: |
          python3 -m pip install --quiet --user semgrep
          export PATH="$HOME/.local/bin:$PATH"
          semgrep ci \
            --config=p/security-audit \
            --config=p/typescript \
            --config=p/javascript \
            --config=p/owasp-top-ten \
            --no-suppress-errors \
            --exclude=dist --exclude=node_modules --exclude=.next --exclude=playwright-report \
            || true

      # Filesystem CVE scan against the lockfile + Dockerfile.  Trivy
      # complements npm audit (image-layer + IaC checks vs. dep-only).
      # Installed via the upstream install script so the version pin is
      # explicit and not coupled to an action's release cadence.
      # Severity gated to HIGH/CRITICAL to match the npm audit threshold.
      - name: Trivy filesystem scan
        if: always()
        continue-on-error: true
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP" v0.58.1
          "$RUNNER_TEMP/trivy" fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --skip-dirs node_modules,dist,playwright-report \
            .
