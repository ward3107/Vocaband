# CI — Playwright end-to-end smoke test.
#
# Separate from ci.yml because:
#   - Browser install adds ~30s and ~150 MB of cache
#   - We want PR feedback in <2 min from ci.yml; e2e runs in parallel
#     and reports its own status check
#   - When e2e is flaky on a network hiccup we don't want to block
#     the typecheck / unit gate
#
# Goal: catch the smoke-level "does the app load and the SPA shell
# render" failures.  Anything deeper (full teacher flow, real
# Supabase) lives in dedicated suites that aren't in this gate yet.

name: CI — e2e smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
